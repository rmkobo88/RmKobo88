<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>RM KOBO88</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<header class="header">

<img src="logo.png" class="logo" alt="RM KOBO88">

<h1>RM KOBO88</h1>

<div id="statusBuka"></div>

</header>

<div class="search-box">

<input
type="text"
id="search"
placeholder="Cari menu...">

</div>

<div class="kategori">

<button onclick="filterMenu('all')">
Semua
</button>

<button onclick="filterMenu('ayam')">
Ayam
</button>

<button onclick="filterMenu('ikan')">
Ikan & Iga
</button>

<button onclick="filterMenu('ricebowl')">
Rice Bowl
</button>

<button onclick="filterMenu('sayur')">
Sayur
</button>

<button onclick="filterMenu('chacha')">
Cha Cha
</button>

<button onclick="filterMenu('cemilan')">
Cemilan
</button>

<button onclick="filterMenu('minuman')">
Minuman
</button>

</div>

<div style="padding:15px;text-align:center;">

<input
type="file"
id="excelFile"
accept=".xlsx,.xls">

</div>

<div id="menu-container"></div>

<div id="cart-popup">

<div class="popup-header">

<h2>🛒 Keranjang</h2>

<button
class="close-btn"
onclick="toggleCart()">
✕
</button>

<button onclick="clearCart()">
🗑 Kosongkan Keranjang
</button>

</div>

<select
id="jenisOrder"
onchange="saveForm(); tampilkanForm()">

<option value="">
Pilih Jenis Pesanan
</option>

<option value="Dine In">
🍽️ Makan Di Tempat
</option>

<option value="Take Away">
🥡 Take Away
</option>

<option value="Delivery">
🛵 Delivery
</option>

</select>

<br><br>

<div id="mejaBox">

<select
id="nomorMeja"
onchange="saveForm()">

<option value="">
Pilih Nomor Meja
</option>

<option>Meja 1</option>
<option>Meja 2</option>
<option>Meja 3</option>
<option>Meja 4</option>
<option>Meja 5</option>

</select>

</div>

<div id="alamatBox">

<textarea
id="alamatDelivery"
onkeyup="saveForm()"
placeholder="Masukkan alamat delivery">
</textarea>

</div>

<br>

<!-- INI WAJIB ADA -->
<div id="popup-items">
Belum ada pesanan
</div>

<br>

<div id="popup-total">
Total Item : 0
</div>

<br>

<div class="customer-form">

<label>Nama Customer</label>

<input
type="text"
id="customerName"
onkeyup="saveForm()"
placeholder="Masukkan nama">

<label>Catatan Pesanan</label>

<textarea
id="customerNote"
onkeyup="saveForm()"
placeholder="Pedas sedang, tanpa bawang, dll">
</textarea>

</div>

<button class="btn"
onclick="checkoutWA()">
Checkout WhatsApp
</button>
</div>

</div>

<div id="cart-button"
onclick="toggleCart()">

🛒
<span id="cart-count">
0
</span>

</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script src="menu.js"></script>
<script src="script.js"></script>


</body>
</html>
